<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Let's Go 4: Unit 1 - The Great Outdoors</title>
    <style>
        :root { --red: #d32f2f; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: var(--white); color: #333; margin: 0; padding-bottom: 50px; }
        header { background-color: var(--red); color: var(--white); padding: 30px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 700px; margin: auto; padding: 20px; border: 2px solid var(--red); border-radius: 15px; }
        .vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { padding: 15px; border: 2px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .card:hover { background-color: var(--red); color: white; transform: scale(1.05); }
        .btn { background-color: var(--red); color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        .btn:active { transform: translateY(2px); }
        #feedback { font-weight: bold; margin-top: 15px; font-size: 1.2rem; }
        .progress-container { width: 80%; background: #eee; height: 10px; margin: 20px auto; border-radius: 5px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--red); transition: 0.5s; }
    </style>
</head>
<body>

<header>
    <h1>Unit 1: The Great Outdoors</h1>
    <p>Let's Learn & Play!</p>
</header>

<div class="container">
    <div class="progress-container"><div id="progress-bar"></div></div>
    
    <h2>Vocabulary: What do you have?</h2>
    <p>Click the gear you need for <strong>skateboarding</strong>:</p>
    <div class="vocab-grid">
        <div class="card" onclick="checkVocab('mitt', false)">A Mitt</div>
        <div class="card" onclick="checkVocab('bat', false)">A Bat</div>
        <div class="card" onclick="checkVocab('skateboard', true)">A Skateboard</div>
        <div class="card" onclick="checkVocab('helmet', true)">A Helmet</div>
    </div>

    <hr style="margin: 40px 0; border: 1px solid #eee;">

    <h2>The Weather Chant</h2>
    <p>"The newspaper says it's going to..."</p>
    <button class="btn" onclick="checkWeather('snow')">Snow ❄️</button>
    <button class="btn" onclick="checkWeather('rain')">Rain 🌧️</button>
    <div id="feedback"></div>
</div>

<script>
    let points = 0;
    function updateProgress() {
        const bar = document.getElementById('progress-bar');
        bar.style.width = (points * 25) + "%";
    }

    function checkVocab(item, isCorrect) {
        const f = document.getElementById('feedback');
        if(isCorrect) {
            f.innerText = "Yes! You need " + item + " for skateboarding! ✅";
            f.style.color = "green";
            points++;
            updateProgress();
        } else {
            f.innerText = "Try again! Look at page 6.";
            f.style.color = "red";
        }
    }

    function checkWeather(ans) {
        const f = document.getElementById('feedback');
        if(ans === 'snow') {
            f.innerText = "Correct! 'The newspaper says it's going to snow.' ❄️";
            f.style.color = "green";
            points++;
            updateProgress();
        } else {
            f.innerText = "Not quite. Check page 5! 📖";
            f.style.color = "red";
        }
    }
</script>

</body>
</html>
