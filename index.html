<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Let's Go 4 - Interactive Lesson</title>
    <style>
        :root { --red: #d32f2f; --white: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: var(--white); color: #333; margin: 0; padding-bottom: 50px; }
        header { background-color: var(--red); color: var(--white); padding: 25px; margin-bottom: 20px; }
        .container { max-width: 800px; margin: auto; padding: 20px; border: 2px solid var(--red); border-radius: 15px; }
        
        /* Memory Game Styles */
        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 500px;
        }
        .memory-card {
            height: 100px;
            background-color: var(--red);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #b71c1c;
        }
        .memory-card.hidden { color: transparent; background-color: var(--red); }
        .memory-card.flipped { color: var(--white); background-color: #ff5252; }
        .memory-card.matched { background-color: #4CAF50; border-color: #388E3C; cursor: default; }

        .btn { background-color: var(--red); color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 5px; cursor: pointer; margin: 5px; }
        #feedback { font-weight: bold; margin-top: 15px; font-size: 1.2rem; color: var(--red); }
    </style>
</head>
<body>

<header>
    <h1>Let's Go 4: The Great Outdoors</h1>
    <p>Memory Match & Weather Quiz</p>
</header>

<div class="container">
    <h2>Game 1: Weather Memory Match</h2>
    <p>Find the matching pairs!</p>
    <div class="memory-game" id="gameBoard">
        </div>
    <button class="btn" onclick="resetGame()">Restart Game</button>

    <hr style="margin: 40px 0; border: 1px solid #eee;">

    <h2>Game 2: The Weather Chant</h2>
    <p>"The newspaper says it's going to..."</p>
    <button class="btn" onclick="checkWeather('snow')">Snow ❄️</button>
    <button class="btn" onclick="checkWeather('rain')">Rain 🌧️</button>
    <div id="feedback"></div>
</div>

<script>
    const items = ['☀️', '☀️', '🌧️', '🌧️', '❄️', '❄️', '🌬️', '🌬️'];
    let flippedCards = [];
    let matchedCount = 0;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function createBoard() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = '';
        const shuffledItems = shuffle([...items]);
        shuffledItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.classList.add('memory-card', 'hidden');
            card.dataset.value = item;
            card.innerText = item;
            card.onclick = () => flipCard(card);
            board.appendChild(card);
        });
    }

    function flipCard(card) {
        if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
            card.classList.remove('hidden');
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 700);
            }
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.value === card2.dataset.value) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedCount += 2;
            if (matchedCount === items.length) alert("Great job! You matched them all!");
        } else {
            card1.classList.add('hidden');
            card1.classList.remove('flipped');
            card2.classList.add('hidden');
            card2.classList.remove('flipped');
        }
        flippedCards = [];
